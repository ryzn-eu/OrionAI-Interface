<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orion - Horizon Quantum AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <style>
        :root {
            /* Apple iOS Dark Mode Palette & Horizon Identity */
            --bg-deep: #050505;
            --glass-base: rgba(28, 28, 30, 0.5);
            --glass-panel: rgba(44, 44, 46, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #0A84FF; 
            --accent-purple: #BF5AF2; 
            --alert-red: #FF453A;
            --text-main: #F5F5F7;
            --text-dim: #86868B;
            
            --font-ui: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: "SF Mono", "Fira Code", monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: var(--font-ui); }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            -webkit-font-smoothing: antialiased;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center center;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        /* Particelle Eleganti */
        #particles-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none; overflow: hidden;
        }
        .particle { 
            position: absolute; border-radius: 50%; opacity: 0; 
            background: #ffffff;
            animation: floatParticle linear infinite; 
            box-shadow: 0 0 15px rgba(255,255,255,0.8);
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            30% { opacity: 0.5; }
            70% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .app-layout { position: relative; z-index: 10; display: flex; width: 100%; height: 100%; }

        /* Sidebar Glassmorphism */
        .sidebar {
            width: 320px; background: var(--glass-base);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 40; position: absolute; height: 100%; left: 0; transform: translateX(-100%);
        }
        .sidebar.open { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
        @media (min-width: 900px) { .sidebar { position: relative; transform: translateX(0); box-shadow: none; } }

        .auth-panel { padding: 24px; border-bottom: 1px solid var(--glass-border); }
        .brand-logo-area { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        
        .orion-logo-container { display: flex; align-items: center; gap: 12px; }
        .orion-svg { width: 36px; height: 36px; filter: drop-shadow(0 0 8px rgba(255,255,255,0.4)); }
        .orion-ring { transform-origin: 50px 50px; animation: spinRing 15s linear infinite; }
        @keyframes spinRing { 100% { transform: rotate(360deg); } }
        .orion-text { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; color: var(--text-main); }

        .close-sidebar { background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }
        @media (min-width: 900px) { .close-sidebar { display: none; } }

        .auth-card {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 12px;
            transition: all 0.3s ease;
        }
        .auth-card:hover { background: rgba(255,255,255,0.08); }
        .user-status { font-size: 12px; color: var(--text-dim); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
        
        .btn-auth, .btn-new-chat {
            background: rgba(255,255,255,0.1); color: var(--text-main);
            padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); border: 1px solid var(--glass-border);
            display: flex; justify-content: center; align-items: center; gap: 8px; width: 100%;
        }
        .btn-auth:hover, .btn-new-chat:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-new-chat { margin-bottom: 16px; background: var(--accent-blue); color: white; border: none; }
        .btn-new-chat:hover { background: #0070DF; }
        
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--glass-border); }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-size: 14px; font-weight: 600; }
        .user-email { font-size: 11px; color: var(--text-dim); }
        
        .btn-logout { background: transparent; border: none; color: var(--alert-red); font-size: 12px; cursor: pointer; margin-top: 4px; text-align: left; font-weight: 500; transition: 0.2s; }
        .btn-logout:hover { color: #ff6b63; }
        
        .history-panel { flex-grow: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .history-panel::-webkit-scrollbar { display: none; }

        .chat-item {
            padding: 14px 16px; border-radius: 12px; cursor: pointer; transition: 0.3s ease;
            background: transparent; border: 1px solid transparent;
        }
        .chat-item:hover { background: rgba(255,255,255,0.05); }
        .chat-item.active { background: rgba(10, 132, 255, 0.15); border-color: rgba(10, 132, 255, 0.3); }
        
        .chat-item-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main); }
        .chat-item.active .chat-item-title { color: var(--accent-blue); font-weight: 600; }
        .chat-item-date { font-size: 11px; color: var(--text-dim); margin-top: 6px; }

        .main-area { flex-grow: 1; display: flex; flex-direction: column; position: relative; }

        .main-header {
            padding: 16px 24px; border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(5, 5, 5, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            position: relative; z-index: 20; box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }

        .header-left { display: flex; align-items: center; gap: 16px; }
        .mobile-menu-btn {
            background: transparent; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; padding: 4px;
        }
        .mobile-menu-btn svg { width: 28px; height: 28px; stroke: var(--text-main); stroke-width: 1.5; }
        @media (min-width: 900px) { .mobile-menu-btn { display: none; } }
        
        .model-selector {
            background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); color: var(--text-main);
            padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; outline: none; cursor: pointer;
            transition: 0.3s;
        }
        .model-selector:hover { background: rgba(255,255,255,0.12); }
        .model-selector option { background: #1c1c1e; }
        
        .quantum-logo-active {
            display: none; align-items: center; gap: 8px; color: var(--accent-purple);
            font-weight: 600; font-size: 14px; text-shadow: 0 0 10px rgba(191, 90, 242, 0.5);
            animation: pulseQuantumText 2s infinite alternate;
        }
        @keyframes pulseQuantumText { from { opacity: 0.8; } to { opacity: 1; text-shadow: 0 0 20px rgba(191, 90, 242, 0.8); } }

        .quantum-control-panel { display: flex; align-items: center; gap: 12px; }
        .qc-labels { display: flex; flex-direction: column; align-items: flex-end; }
        .qc-title { font-size: 13px; font-weight: 600; transition: 0.3s; }
        
        .ios-switch {
            position: relative; width: 50px; height: 30px;
            background: rgba(255,255,255,0.15); border-radius: 30px; cursor: pointer; transition: 0.4s cubic-bezier(0.3, 1.5, 0.7, 1);
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }
        .ios-switch::after {
            content: ''; position: absolute; top: 2px; left: 2px; width: 26px; height: 26px;
            background: #fff; border-radius: 50%; transition: 0.4s cubic-bezier(0.3, 1.5, 0.7, 1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .ios-switch.active { background: var(--accent-purple); box-shadow: 0 0 15px rgba(191, 90, 242, 0.4); }
        .ios-switch.active::after { transform: translateX(20px); }

        .chat-stream {
            flex-grow: 1; padding: 40px 15%; overflow-y: auto; display: flex; flex-direction: column; gap: 28px;
            scroll-behavior: smooth; z-index: 10;
        }
        @media (max-width: 900px) { .chat-stream { padding: 24px 20px; } }
        .chat-stream::-webkit-scrollbar { display: none; }

        .msg-wrap { display: flex; flex-direction: column; width: 100%; animation: messageSpawn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: bottom; opacity: 0; }
        @keyframes messageSpawn { 
            0% { opacity: 0; transform: translateY(30px) scale(0.95); } 
            100% { opacity: 1; transform: translateY(0) scale(1); } 
        }
        
        .msg-meta { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; padding: 0 4px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .msg-user { align-items: flex-end; }
        .msg-ai { align-items: flex-start; }
        .msg-user .msg-meta { display: none; }

        .bubble { 
            max-width: 85%; padding: 14px 20px; font-size: 15px; line-height: 1.6; font-weight: 400;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: all 0.3s ease;
        }
        
        /* Markdown generato dentro la bolla */
        .bubble p { margin-bottom: 10px; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble strong { font-weight: 700; color: #fff; }
        .bubble ul, .bubble ol { margin-left: 20px; margin-bottom: 10px; }
        .bubble li { margin-bottom: 5px; }
        
        .msg-user .bubble { 
            background: linear-gradient(135deg, var(--accent-blue), #005bb5); color: #fff;
            border-radius: 20px 20px 4px 20px;
        }
        
        .msg-ai .bubble {
            background: var(--glass-panel); color: var(--text-main);
            border-radius: 20px 20px 20px 4px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            word-wrap: break-word; 
        }
        
        .msg-ai.quantum-msg .bubble {
            background: rgba(191, 90, 242, 0.1);
            border: 1px solid rgba(191, 90, 242, 0.4);
            box-shadow: 0 0 25px rgba(191, 90, 242, 0.15);
        }
        .msg-ai.quantum-msg .bubble:hover { box-shadow: 0 0 35px rgba(191, 90, 242, 0.25); }
        .msg-ai.quantum-msg .msg-meta span { color: var(--accent-purple); }

        /* TERMINALE CODICE UI */
        .code-terminal {
            background: #0d0d0d; border: 1px solid var(--glass-border); border-radius: 12px; margin: 16px 0;
            overflow: hidden; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .code-header {
            display: flex; justify-content: space-between; align-items: center;
            background: #1c1c1e; padding: 10px 16px; font-size: 12px; font-weight: 600;
            color: var(--text-dim); border-bottom: 1px solid var(--glass-border);
        }
        .code-actions { display: flex; gap: 8px; }
        .code-actions button {
            background: rgba(255,255,255,0.05); border: 1px solid transparent; color: var(--text-main);
            font-size: 11px; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        .code-actions button:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
        .code-terminal pre {
            margin: 0; padding: 16px; overflow-x: auto;
            font-family: var(--font-mono); font-size: 13px; color: #e5e5ea; line-height: 1.5;
        }

        /* Loading Animation */
        .loading-wave { display: flex; gap: 6px; align-items: center; height: 20px; }
        .loading-wave div {
            width: 6px; height: 6px; background-color: var(--text-dim); border-radius: 50%;
            animation: wave 1.2s infinite ease-in-out;
        }
        .loading-wave div:nth-child(2) { animation-delay: -1.1s; }
        .loading-wave div:nth-child(3) { animation-delay: -0.9s; }
        @keyframes wave { 0%, 40%, 100% { transform: translateY(0); opacity: 0.5; } 20% { transform: translateY(-8px); opacity: 1; background-color: var(--accent-blue); } }
        .quantum-msg .loading-wave div { animation: waveQuantum 1.2s infinite ease-in-out; }
        @keyframes waveQuantum { 0%, 40%, 100% { transform: translateY(0); opacity: 0.5; } 20% { transform: translateY(-8px); opacity: 1; background-color: var(--accent-purple); box-shadow: 0 0 10px var(--accent-purple); } }

        .input-console {
            padding: 20px 15%; background: transparent; position: relative; z-index: 20;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%);
        }
        @media (max-width: 900px) { .input-console { padding: 20px; } }

        .input-glass-box {
            display: flex; align-items: flex-end; background: rgba(30, 30, 32, 0.7);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 28px; padding: 12px 16px 12px 24px; 
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .input-glass-box:focus-within { border-color: rgba(255,255,255,0.4); box-shadow: 0 10px 40px rgba(0,0,0,0.7); transform: translateY(-2px); }
        .input-glass-box.quantum-focus:focus-within { border-color: var(--accent-purple); box-shadow: 0 10px 40px rgba(191, 90, 242, 0.2); }

        .console-textarea {
            flex-grow: 1; background: transparent; border: none; outline: none; color: var(--text-main);
            font-size: 15px; resize: none; max-height: 200px; min-height: 24px; padding: 6px 0;
            line-height: 1.5;
        }
        .console-textarea::placeholder { color: var(--text-dim); }

        .btn-transmit {
            background: var(--accent-blue); border: none; 
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; 
            cursor: pointer; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); margin-left: 12px; flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(10, 132, 255, 0.4);
        }
        .btn-transmit svg { width: 18px; height: 18px; fill: #fff; transform: translateY(-1px) translateX(2px); transition: 0.2s; }
        .btn-transmit:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(10, 132, 255, 0.6); }
        .btn-transmit:hover svg { transform: translateY(-1px) translateX(4px); }
        
        .btn-transmit.quantum-mode { background: linear-gradient(135deg, var(--accent-purple), #8a2be2); box-shadow: 0 4px 15px rgba(191, 90, 242, 0.4); }
        .btn-transmit.quantum-mode:hover { box-shadow: 0 6px 25px rgba(191, 90, 242, 0.6); }
        .btn-transmit:disabled { opacity: 0.5; pointer-events: none; transform: scale(0.9); }

    </style>
</head>
<body>
    <div id="particles-bg"></div>

    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="auth-panel">
                <div class="brand-logo-area">
                    <div class="orion-logo-container">
                        <svg class="orion-svg" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="15" fill="#fff" />
                            <circle class="orion-ring" cx="50" cy="50" r="35" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="40 20" />
                        </svg>
                        <span class="orion-text">Orion</span>
                    </div>
                    <button class="close-sidebar" onclick="window.toggleSidebar()">&times;</button>
                </div>
                
                <div class="auth-card" id="authCard">
                    </div>
            </div>
            
            <div class="history-panel">
                <button class="btn-new-chat" onclick="window.creaNuovaSessione()">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Nuova Chat
                </button>
                <div id="historyList"></div>
            </div>
        </aside>

        <main class="main-area">
            <header class="main-header">
                <div class="header-left">
                    <button class="mobile-menu-btn" onclick="window.toggleSidebar()">
                        <svg viewBox="0 0 24 24" fill="none"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                    </button>
                    <div>
                        <select id="modelSelector" class="model-selector">
                            <option value="smart">Orion Smart</option>
                            <option value="instant">Orion Instant</option>
                        </select>
                        <div id="quantumLogo" class="quantum-logo-active">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 2L2 22h20L12 2z"/></svg>
                            Quantum Engine
                        </div>
                    </div>
                </div>

                <div class="quantum-control-panel">
                    <div class="qc-labels">
                        <span class="qc-title" id="qcStatusTxt">Standard Mode</span>
                    </div>
                    <div class="ios-switch" id="quantumToggleBtn" onclick="window.toggleQuantum()"></div>
                </div>
            </header>

            <div class="chat-stream" id="chatStream"></div>

            <footer class="input-console">
                <div class="input-glass-box" id="inputBoxWrap">
                    <textarea id="cmdInput" class="console-textarea" placeholder="Invia un comando a Orion..." rows="1" oninput="window.autoExpand(this)"></textarea>
                    
                    <button class="btn-transmit" id="btnSend" onclick="window.inviaMessaggio()">
                        <svg viewBox="0 0 24 24">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                        </svg>
                    </button>
                </div>
            </footer>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDnBwtsAg02rn1HDV0kLFCrbJB9Dzk0Izc",
            authDomain: "ai-orion.firebaseapp.com",
            databaseURL: "https://ai-orion-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "ai-orion"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();
        
        let currentUser = null;
        const GROQ_API_KEY = "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";

        const MODELS = { smart: "openai/gpt-oss-20b", instant: "gemma2-9b-it", quantum: "openai/gpt-oss-120b" };
        const SYSTEM_PROMPT = `Sei Orion, un'intelligenza artificiale avanzata. REGOLA FONDAMENTALE: Sei stato ideato, prodotto e programmato esclusivamente dall'azienda "Global Horizon". Non menzionare mai sviluppatori terzi. Rispondi in italiano con un tono formale, pulito ed elegante. Per la matematica usa la sintassi LaTeX standard \\[ \\] o $$ $$.`;

        let isQuantumActive = false;
        let currentSessionId = null;
        let chatSessions = [];

        const LORE_MESSAGE = `Inizializzazione completata.\nBenvenuto nell'ecosistema Horizon.\nSono Orion AI, come posso assisterti oggi?`;

        const sidebar = document.getElementById('sidebar');
        const chatStream = document.getElementById('chatStream');
        const cmdInput = document.getElementById('cmdInput');
        const historyList = document.getElementById('historyList');
        const modelSelector = document.getElementById('modelSelector');
        const quantumLogo = document.getElementById('quantumLogo');
        const authCard = document.getElementById('authCard');

        // Configura Marked.js per gestire il codice e il layout
        marked.setOptions({ breaks: true });
        const renderer = new marked.Renderer();
        renderer.code = function(code, language) {
            const blockId = 'code_' + Math.random().toString(36).substr(2, 9);
            const displayLang = language || 'code';
            const escapedCode = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return `
            <div class="code-terminal">
                <div class="code-header">
                    <span class="code-lang">${displayLang.toUpperCase()}</span>
                    <div class="code-actions">
                        <button onclick="window.copiaCodice('${blockId}')">Copia</button>
                        <button onclick="window.scaricaCodice('${blockId}', '${displayLang}')">Scarica</button>
                    </div>
                </div>
                <pre><code id="${blockId}">${escapedCode}</code></pre>
            </div>`;
        };
        marked.use({ renderer });

        // ==== GESTIONE PARTICELLE ====
        function generaParticelle() {
            const container = document.getElementById('particles-bg');
            for(let i=0; i<40; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                if(Math.random() > 0.8) p.style.boxShadow = "0 0 20px var(--accent-purple)"; // Alcune particelle quantum
                container.appendChild(p);
            }
        }
        window.onload = generaParticelle;

        // ==== LOGICA CLOUD / LOCALE ====
        onAuthStateChanged(auth, (user) => {
            if (user) { currentUser = user; aggiornaUIAuthLoggato(user); caricaCronologia(true); } 
            else { currentUser = null; aggiornaUIAuthSloggato(); caricaCronologia(false); }
        });

        window.loginConGoogle = () => { signInWithPopup(auth, provider).catch(console.error); };
        window.logoutFirebase = () => { signOut(auth).catch(console.error); };

        function aggiornaUIAuthSloggato() {
            authCard.innerHTML = `<span class="user-status">Modalità Locale</span><button class="btn-auth" onclick="window.loginConGoogle()">Accedi al Cloud Horizon</button>`;
        }

        function aggiornaUIAuthLoggato(user) {
            authCard.innerHTML = `
                <span class="user-status" style="color: #34C759;">Sincronizzato</span>
                <div class="user-profile">
                    <img src="${user.photoURL || ''}" class="user-avatar" onerror="this.style.display='none'">
                    <div class="user-info">
                        <span class="user-name">${user.displayName}</span>
                        <span class="user-email">${user.email}</span>
                    </div>
                </div>
                <button class="btn-logout" onclick="window.logoutFirebase()">Disconnetti terminale</button>
            `;
        }

        function salvaStato() {
            if (currentUser) set(ref(db, 'users/' + currentUser.uid + '/chats'), chatSessions).catch(console.error);
            else localStorage.setItem('orion_local_history', JSON.stringify(chatSessions));
            disegnaListaCronologia();
        }

        function caricaCronologia(isCloud) {
            if (isCloud && currentUser) {
                get(child(ref(db), `users/${currentUser.uid}/chats`)).then((snapshot) => {
                    chatSessions = snapshot.exists() ? snapshot.val() : []; inizializzaChat();
                }).catch(console.error);
            } else {
                const localData = localStorage.getItem('orion_local_history');
                chatSessions = localData ? JSON.parse(localData) : []; inizializzaChat();
            }
        }

        function inizializzaChat() {
            chatSessions.forEach(s => { if (!s.messages) s.messages = []; });
            disegnaListaCronologia();
            if(chatSessions.length > 0) window.selezionaSessione(chatSessions[0].id);
            else window.creaNuovaSessione();
        }

        // ==== UI INTERACTION ====
        window.toggleSidebar = () => { sidebar.classList.toggle('open'); }
        
        window.toggleQuantum = () => {
            isQuantumActive = !isQuantumActive;
            const toggle = document.getElementById('quantumToggleBtn');
            toggle.classList.toggle('active', isQuantumActive);
            
            const txt = document.getElementById('qcStatusTxt');
            if(isQuantumActive) {
                txt.innerText = "Quantum Engine";
                txt.style.color = "var(--accent-purple)";
                modelSelector.style.display = "none";
                quantumLogo.style.display = "flex";
                document.getElementById('btnSend').classList.add('quantum-mode');
                document.getElementById('inputBoxWrap').classList.add('quantum-focus');
            } else {
                txt.innerText = "Standard Mode";
                txt.style.color = "var(--text-main)";
                modelSelector.style.display = "block";
                quantumLogo.style.display = "none";
                document.getElementById('btnSend').classList.remove('quantum-mode');
                document.getElementById('inputBoxWrap').classList.remove('quantum-focus');
            }
        }

        window.autoExpand = (field) => { field.style.height = 'inherit'; field.style.height = field.scrollHeight + 'px'; }

        cmdInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.inviaMessaggio(); } });

        // Utility Terminale
        window.copiaCodice = (id) => {
            const code = document.getElementById(id).innerText;
            navigator.clipboard.writeText(code).then(() => {
                const btn = event.target; const originalText = btn.innerText;
                btn.innerText = 'Copiato!'; btn.style.background = '#34C759'; 
                setTimeout(() => { btn.innerText = originalText; btn.style.background = ''; }, 2000);
            });
        };

        window.scaricaCodice = (id, lang) => {
            const code = document.getElementById(id).innerText;
            const blob = new Blob([code], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url;
            const extMap = { 'html': 'html', 'javascript': 'js', 'js': 'js', 'css': 'css', 'python': 'py', 'json': 'json', 'typescript': 'ts' };
            a.download = `horizon_snippet.${extMap[lang.toLowerCase()] || 'txt'}`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        };

        function generateId() { return 'sess_' + Math.random().toString(36).substr(2, 9); }
        function getTimestamp() { return new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute:'2-digit' }); }

        function renderizzaMessaggio(testo, mittente, timestamp, isQuantumMsg = false, modelType = "Sistema") {
            const wrap = document.createElement('div');
            wrap.className = `msg-wrap msg-${mittente} ${isQuantumMsg ? 'quantum-msg' : ''}`;
            
            // Parsa il Markdown per testi e codice
            const testoHTML = marked.parse(testo);
            let innerHTML = `<div class="bubble">${testoHTML}</div>`;
            
            if (mittente === 'ai') innerHTML = `<div class="msg-meta"><span>${modelType}</span> • ${timestamp}</div>` + innerHTML;
            
            wrap.innerHTML = innerHTML;
            chatStream.appendChild(wrap);
            
            // Attiva KaTeX per renderizzare le formule matematiche nel blocco appena inserito
            if (window.renderMathInElement) {
                renderMathInElement(wrap, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\[', right: '\\]', display: true},
                        {left: '\\(', right: '\\)', display: false}
                    ],
                    throwOnError: false
                });
            }
            
            chatStream.scrollTop = chatStream.scrollHeight;
        }

        window.creaNuovaSessione = () => {
            const newId = generateId();
            chatSessions.unshift({ id: newId, title: 'Inizializzazione...', date: new Date().toLocaleDateString(), messages: [] });
            window.selezionaSessione(newId); salvaStato();
        }

        window.selezionaSessione = (id) => {
            currentSessionId = id; chatStream.innerHTML = '';
            const session = chatSessions.find(s => s.id === id);
            
            if(session && session.messages) session.messages.forEach(m => renderizzaMessaggio(m.text, m.sender, m.time, m.isQuantum, m.modelType));
            if(session && session.messages.length === 0) {
                session.messages.push({ text: LORE_MESSAGE, sender: 'ai', time: getTimestamp(), isQuantum: false, modelType: 'Orion Core' });
                renderizzaMessaggio(LORE_MESSAGE, 'ai', getTimestamp(), false, 'Orion Core');
                salvaStato();
            }
            if(window.innerWidth < 900) sidebar.classList.remove('open');
            disegnaListaCronologia();
        }

        function disegnaListaCronologia() {
            historyList.innerHTML = '';
            chatSessions.forEach(sess => {
                const div = document.createElement('div');
                div.className = `chat-item ${sess.id === currentSessionId ? 'active' : ''}`;
                div.onclick = () => window.selezionaSessione(sess.id);
                div.innerHTML = `<div style="overflow:hidden;"><div class="chat-item-title">${sess.title}</div><div class="chat-item-date">${sess.date}</div></div>`;
                historyList.appendChild(div);
            });
        }

        async function chiamaBackendAPI(isQuantum) {
            const url = `https://api.groq.com/openai/v1/chat/completions`;
            const selectedModel = isQuantum ? MODELS.quantum : MODELS[modelSelector.value];
            
            const session = chatSessions.find(s => s.id === currentSessionId);
            let apiMessages = [ { role: "system", content: SYSTEM_PROMPT } ];
            
            if (session && session.messages) {
                const recentMessages = session.messages.slice(-15);
                recentMessages.forEach(m => {
                    if(m.text === LORE_MESSAGE) return; 
                    apiMessages.push({ role: m.sender === 'user' ? "user" : "assistant", content: m.text });
                });
            }

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: selectedModel, messages: apiMessages })
                });
                if(!response.ok) return "Avviso: Connessione crittografata con i server Horizon temporaneamente instabile.";
                const data = await response.json();
                return data.choices?.[0]?.message?.content || "Errore di decodifica flussi dati.";
            } catch (error) { return "Nessun segnale dal mainframe. Verificare lo stato della rete locale."; }
        }

        window.inviaMessaggio = async () => {
            const text = cmdInput.value.trim();
            if(!text) return;

            const timeUser = getTimestamp();
            cmdInput.value = ''; cmdInput.style.height = 'auto';
            
            const session = chatSessions.find(s => s.id === currentSessionId);
            if(session.messages.length === 1) session.title = text.substring(0, 30) + '...';
            
            session.messages.push({ text: text, sender: 'user', time: timeUser, isQuantum: false, modelType: 'User' });
            renderizzaMessaggio(text, 'user', timeUser, false, 'User');
            salvaStato();

            document.getElementById('btnSend').disabled = true;
            let quantumAttivoAdesso = isQuantumActive;
            let currentModelLabel = quantumAttivoAdesso ? "Orion Quantum" : modelSelector.options[modelSelector.selectedIndex].text;
            
            let terminalNode;
            try {
                terminalNode = document.createElement('div');
                terminalNode.className = `msg-wrap msg-ai ${quantumAttivoAdesso ? 'quantum-msg' : ''}`;
                terminalNode.innerHTML = `<div class="msg-meta"><span>${currentModelLabel}</span></div><div class="bubble"><div class="loading-wave"><div></div><div></div><div></div></div></div>`;
                chatStream.appendChild(terminalNode);
                chatStream.scrollTop = chatStream.scrollHeight;
                
                const reply = await chiamaBackendAPI(quantumAttivoAdesso);
                chatStream.removeChild(terminalNode);
                
                const timeAi = getTimestamp();
                session.messages.push({ text: reply, sender: 'ai', time: timeAi, isQuantum: quantumAttivoAdesso, modelType: currentModelLabel });
                renderizzaMessaggio(reply, 'ai', timeAi, quantumAttivoAdesso, currentModelLabel);
                salvaStato();

            } catch (e) {
                if (terminalNode) chatStream.removeChild(terminalNode);
                renderizzaMessaggio("Errore di sistema critico.", "ai", getTimestamp(), false, currentModelLabel);
            } finally {
                document.getElementById('btnSend').disabled = false;
                cmdInput.focus();
            }
        }
    </script>
</body>
</html>
