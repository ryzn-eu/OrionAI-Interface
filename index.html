<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orion.AI - Ultra Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <style>
        :root {
            --bg-deep: #050505;
            --glass-base: rgba(28, 28, 30, 0.5);
            --glass-panel: rgba(44, 44, 46, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #0A84FF; 
            --accent-purple: #BF5AF2; 
            --alert-red: #FF453A;
            --text-main: #F5F5F7;
            --text-dim: #86868B;
            --font-ui: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: "SF Mono", "Fira Code", monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: var(--font-ui); }

        body { background-color: var(--bg-deep); color: var(--text-main); height: 100dvh; width: 100vw; overflow: hidden; display: flex; -webkit-font-smoothing: antialiased; }

        #neural-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; overflow: hidden; }

        .app-layout { position: relative; z-index: 10; display: flex; width: 100%; height: 100%; }

        /* Sidebar Sinistra */
        .sidebar { width: 320px; background: var(--glass-base); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 40; position: absolute; height: 100%; left: 0; transform: translateX(-100%); }
        .sidebar.open { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
        
        /* Sidebar Destra */
        .right-sidebar { width: 320px; background: var(--glass-base); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border-left: 1px solid var(--glass-border); display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 40; position: absolute; height: 100%; right: 0; transform: translateX(100%); }
        .right-sidebar.open { transform: translateX(0); box-shadow: -20px 0 50px rgba(0,0,0,0.5); }

        @media (min-width: 900px) { 
            .sidebar, .right-sidebar { position: relative; transform: translateX(0); box-shadow: none; flex-shrink: 0; }
        }

        .auth-panel { padding: 24px; border-bottom: 1px solid var(--glass-border); }
        .brand-logo-area { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        
        .orion-logo-container { display: flex; align-items: center; gap: 12px; }
        .orion-svg { width: 36px; height: 36px; filter: drop-shadow(0 0 15px rgba(10, 132, 255, 0.8)); }
        .orion-core-pulse { animation: pulseCore 2.5s infinite alternate; }
        @keyframes pulseCore { 0% { r: 14; opacity: 0.9; } 100% { r: 16; opacity: 1; filter: drop-shadow(0 0 10px #fff); } }
        .orion-ring { transform-origin: 50px 50px; animation: spinRing 12s linear infinite; stroke: rgba(255,255,255,0.6); }
        @keyframes spinRing { 100% { transform: rotate(360deg); } }
        
        .orion-text-quasar { font-family: 'Roboto', sans-serif; font-weight: 900; font-size: 22px; letter-spacing: 1.5px; color: var(--text-main); text-shadow: 0 0 20px rgba(255,255,255,0.4); text-transform: uppercase; display: inline-flex; align-items: center; }
        .orion-i-wrapper { position: relative; display: inline-block; }
        .i-dot-orange-white { position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 6.5px; height: 6.5px; background: radial-gradient(circle, #ffffff 30%, #ff5100 100%); border-radius: 50%; box-shadow: 0 0 15px #ff5100, 0 0 5px #ffffff; z-index: 10; }
        .i-dot-blue-orbit { position: absolute; top: -1.5px; left: 50%; width: 4px; height: 4px; background: #00E5FF; border-radius: 50%; box-shadow: 0 0 10px #00E5FF; z-index: 11; transform-origin: 0px 0px; animation: orbitDot 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes orbitDot { from { transform: rotate(0deg) translateX(12px); } to { transform: rotate(360deg) translateX(12px); } }

        .close-sidebar { background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }
        @media (min-width: 900px) { .close-sidebar { display: none; } }

        .auth-card { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 12px; transition: all 0.3s ease; }
        .user-status { font-size: 12px; color: var(--text-dim); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
        
        .update-banner { margin-top: 16px; padding: 14px; background: linear-gradient(135deg, rgba(10, 132, 255, 0.1), rgba(191, 90, 242, 0.05)); border: 1px solid rgba(10, 132, 255, 0.3); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .update-banner h4 { color: var(--accent-blue); font-size: 13px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .update-banner p { font-size: 12px; color: var(--text-dim); line-height: 1.4; }

        .btn-auth, .btn-new-chat { background: rgba(255,255,255,0.1); color: var(--text-main); padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; border: 1px solid var(--glass-border); display: flex; justify-content: center; align-items: center; gap: 8px; width: 100%; }
        .btn-auth:hover, .btn-new-chat:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-new-chat { margin-bottom: 16px; background: var(--accent-blue); color: white; border: none; box-shadow: 0 4px 15px rgba(10, 132, 255, 0.3); }
        .btn-new-chat:hover { background: #0070DF; }
        
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--glass-border); }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-size: 14px; font-weight: 600; }
        .user-email { font-size: 11px; color: var(--text-dim); }
        .btn-logout { background: transparent; border: none; color: var(--alert-red); font-size: 12px; cursor: pointer; margin-top: 4px; text-align: left; font-weight: 500; transition: 0.2s; }

        .history-panel { flex-grow: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .history-panel::-webkit-scrollbar { display: none; }

        .chat-item { padding: 14px 16px; border-radius: 12px; cursor: pointer; transition: 0.3s ease; background: transparent; border: 1px solid transparent; position: relative; display: flex; justify-content: space-between; align-items: center; }
        .chat-item:hover { background: rgba(255,255,255,0.05); }
        .chat-item.active { background: rgba(10, 132, 255, 0.15); border-color: rgba(10, 132, 255, 0.3); }
        .chat-item-content { overflow: hidden; flex-grow: 1; }
        .chat-item-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main); padding-right: 10px; }
        .chat-item.active .chat-item-title { color: var(--accent-blue); font-weight: 600; }
        .chat-item-date { font-size: 11px; color: var(--text-dim); margin-top: 6px; }

        .chat-options-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; padding: 4px; border-radius: 50%; display: flex; }
        .chat-options-btn:hover { color: var(--text-main); background: rgba(255,255,255,0.1); }
        
        .chat-popup { position: absolute; right: 10px; top: 40px; background: rgba(30,30,32,0.95); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 8px; padding: 4px; display: none; z-index: 50; box-shadow: 0 10px 25px rgba(0,0,0,0.5); min-width: 120px; }
        .chat-popup.show { display: block; animation: popIn 0.2s ease forwards; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95) translateY(-5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .chat-popup button { width: 100%; text-align: left; background: none; border: none; padding: 10px 12px; color: var(--text-main); font-size: 13px; border-radius: 6px; cursor: pointer; }
        .chat-popup button:hover { background: rgba(255,255,255,0.1); }
        .chat-popup button.delete-btn { color: var(--alert-red); }

        .sidebar-footer { padding: 20px 24px; border-top: 1px solid var(--glass-border); display: flex; align-items: center; gap: 12px; background: rgba(20, 20, 22, 0.2); margin-top: auto; }
        .horizon-brand-text { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; background: linear-gradient(90deg, var(--text-main), var(--text-dim)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .main-area { flex-grow: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }

        .main-header { padding: 16px 24px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; background: rgba(5, 5, 5, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); position: relative; z-index: 20; box-shadow: 0 4px 30px rgba(0,0,0,0.5); }

        .header-left, .header-right { display: flex; align-items: center; gap: 16px; position: relative; }
        .icon-btn { background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 6px; border-radius: 8px; transition: 0.2s; color: var(--text-main); }
        .icon-btn:hover { background: rgba(255,255,255,0.1); }
        .icon-btn svg { width: 26px; height: 26px; stroke: currentColor; stroke-width: 1.5; fill: none; }

        /* Responsive UI Elements */
        .desktop-only { display: block; }
        .mobile-only { display: none; }
        @media (max-width: 900px) { 
            .desktop-only { display: none !important; } 
            .mobile-only { display: flex !important; } 
            
            /* UI Mobile Resizing */
            .sidebar { width: 280px; }
            .right-sidebar { width: 280px; }
            .main-header { padding: 10px 16px; gap: 8px; }
            .icon-btn { padding: 4px; }
            .icon-btn svg { width: 22px; height: 22px; }
            .bubble { padding: 12px 16px; font-size: 14px; }
            .chat-stream { padding: 20px 16px; gap: 20px; }
            .input-console { padding: 12px 16px; }
            .input-glass-box { padding: 8px 12px 8px 16px; border-radius: 20px; }
            .console-textarea { font-size: 14px; }
            .btn-transmit { width: 34px; height: 34px; margin-left: 8px; }
            .orion-text-quasar { font-size: 18px; }
            .orion-svg { width: 28px; height: 28px; }
        }

        /* Glass Popup Mobile */
        .glass-popup { position: absolute; top: 50px; background: rgba(30,30,32,0.95); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 12px; padding: 8px; display: none; z-index: 60; box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-width: 160px; max-height: 300px; overflow-y: auto; }
        .glass-popup.show { display: block; animation: popIn 0.2s ease forwards; }
        .glass-popup button { width: 100%; text-align: left; background: none; border: none; padding: 12px 16px; color: var(--text-main); font-size: 14px; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .glass-popup button:hover, .glass-popup button.active { background: rgba(255,255,255,0.1); color: var(--accent-blue); }

        .lang-selector, .model-selector { background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); color: var(--text-main); padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; outline: none; cursor: pointer; transition: 0.3s; margin-right: 12px; }
        .lang-selector:hover, .model-selector:hover { background: rgba(255,255,255,0.12); }
        .lang-selector option, .model-selector option { background: #1c1c1e; }
        
        .quantum-logo-active { display: none; align-items: center; gap: 8px; color: var(--accent-purple); font-weight: 600; font-size: 14px; text-shadow: 0 0 10px rgba(191, 90, 242, 0.5); animation: pulseQuantumText 2s infinite alternate; }
        @keyframes pulseQuantumText { from { opacity: 0.8; } to { opacity: 1; text-shadow: 0 0 20px rgba(191, 90, 242, 0.8); } }

        .quantum-control-panel { display: flex; align-items: center; gap: 12px; }
        .qc-labels { display: flex; flex-direction: column; align-items: flex-end; }
        .qc-title { font-size: 13px; font-weight: 600; transition: 0.3s; }
        @media (max-width: 900px) { .qc-title { font-size: 11px; } .quantum-control-panel { gap: 6px; } }
        
        .ios-switch { position: relative; width: 50px; height: 30px; background: rgba(255,255,255,0.15); border-radius: 30px; cursor: pointer; transition: 0.4s; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); }
        .ios-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 26px; height: 26px; background: #fff; border-radius: 50%; transition: 0.4s; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .ios-switch.active { background: var(--accent-purple); box-shadow: 0 0 15px rgba(191, 90, 242, 0.4); }
        .ios-switch.active::after { transform: translateX(20px); }

        .chat-stream { flex-grow: 1; padding: 40px 10%; overflow-y: auto; display: flex; flex-direction: column; gap: 28px; scroll-behavior: smooth; z-index: 10; }
        .chat-stream::-webkit-scrollbar { display: none; }

        .msg-wrap { display: flex; flex-direction: column; width: 100%; animation: messageSpawn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: bottom; opacity: 0; }
        @keyframes messageSpawn { 0% { opacity: 0; transform: translateY(30px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        
        .msg-meta { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; padding: 0 4px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .msg-user { align-items: flex-end; }
        .msg-ai { align-items: flex-start; }
        .msg-user .msg-meta { display: none; }

        .bubble { max-width: 85%; padding: 14px 20px; font-size: 15px; line-height: 1.6; font-weight: 400; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: all 0.3s ease; }
        .bubble p { margin-bottom: 10px; } .bubble p:last-child { margin-bottom: 0; }
        .bubble strong { font-weight: 700; color: #fff; }
        .bubble ul, .bubble ol { margin-left: 20px; margin-bottom: 10px; } .bubble li { margin-bottom: 5px; }
        
        .msg-user .bubble { background: linear-gradient(135deg, var(--accent-blue), #005bb5); color: #fff; border-radius: 20px 20px 4px 20px; }
        .msg-ai .bubble { background: var(--glass-panel); color: var(--text-main); border-radius: 20px 20px 20px 4px; border: 1px solid var(--glass-border); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); word-wrap: break-word; }
        .msg-ai.quantum-msg .bubble { background: rgba(191, 90, 242, 0.1); border: 1px solid rgba(191, 90, 242, 0.4); box-shadow: 0 0 25px rgba(191, 90, 242, 0.15); }
        .msg-ai.quantum-msg .msg-meta span { color: var(--accent-purple); }

        .ai-generated-image { background: rgba(255,255,255,0.05); border: 1px dashed var(--glass-border); border-radius: 12px; padding: 20px; margin: 15px 0; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .ai-generated-image svg { max-width: 100%; height: auto; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }

        .code-terminal { background: #0d0d0d; border: 1px solid var(--glass-border); border-radius: 12px; margin: 16px 0; overflow: hidden; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .code-header { display: flex; justify-content: space-between; align-items: center; background: #1c1c1e; padding: 10px 16px; font-size: 12px; font-weight: 600; color: var(--text-dim); border-bottom: 1px solid var(--glass-border); }
        .code-actions { display: flex; gap: 8px; }
        .code-actions button { background: rgba(255,255,255,0.05); border: 1px solid transparent; color: var(--text-main); font-size: 11px; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
        .code-actions button:hover { background: rgba(255,255,255,0.1); }
        .code-terminal pre { margin: 0; padding: 16px; overflow-x: auto; font-family: var(--font-mono); font-size: 13px; color: #e5e5ea; line-height: 1.5; }

        .loading-wave { display: flex; gap: 6px; align-items: center; height: 20px; }
        .loading-wave div { width: 6px; height: 6px; background-color: var(--text-dim); border-radius: 50%; animation: wave 1.2s infinite ease-in-out; }
        .loading-wave div:nth-child(2) { animation-delay: -1.1s; } .loading-wave div:nth-child(3) { animation-delay: -0.9s; }
        @keyframes wave { 0%, 40%, 100% { transform: translateY(0); opacity: 0.5; } 20% { transform: translateY(-8px); opacity: 1; background-color: var(--accent-blue); } }

        .input-console { padding: 20px 10%; background: transparent; position: relative; z-index: 20; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%); }
        .input-glass-box { display: flex; align-items: flex-end; background: rgba(30, 30, 32, 0.7); border: 1px solid rgba(255,255,255,0.15); border-radius: 28px; padding: 12px 16px 12px 24px; backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-glass-box:focus-within { border-color: rgba(255,255,255,0.4); box-shadow: 0 10px 40px rgba(0,0,0,0.7); transform: translateY(-2px); }
        .input-glass-box.quantum-focus:focus-within { border-color: var(--accent-purple); box-shadow: 0 10px 40px rgba(191, 90, 242, 0.2); }
        .console-textarea { flex-grow: 1; background: transparent; border: none; outline: none; color: var(--text-main); font-size: 15px; resize: none; max-height: 200px; min-height: 24px; padding: 6px 0; line-height: 1.5; }
        
        .btn-transmit { background: var(--accent-blue); border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; margin-left: 12px; flex-shrink: 0; box-shadow: 0 4px 15px rgba(10, 132, 255, 0.4); }
        .btn-transmit svg { width: 18px; height: 18px; fill: #fff; transform: translateY(-1px) translateX(2px); transition: 0.2s; }
        .btn-transmit:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(10, 132, 255, 0.6); }
        .btn-transmit.quantum-mode { background: linear-gradient(135deg, var(--accent-purple), #8a2be2); box-shadow: 0 4px 15px rgba(191, 90, 242, 0.4); }

        .right-panel-header { padding: 24px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
        .right-panel-title { font-size: 16px; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        .notes-area { flex-grow: 1; padding: 16px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
        .notes-area::-webkit-scrollbar { display: none; }
        .task-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .task-item { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; }
        .task-item input[type="checkbox"] { accent-color: var(--accent-blue); width: 16px; height: 16px; cursor: pointer; }
        .task-item input[type="text"] { background: transparent; border: none; color: var(--text-main); flex-grow: 1; outline: none; font-size: 13px; }
        .task-item input[type="text"].done { text-decoration: line-through; color: var(--text-dim); }
        .add-task-btn { background: rgba(255,255,255,0.08); border: 1px dashed var(--glass-border); color: var(--text-main); padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; font-size: 12px; transition: 0.2s; }
        .add-task-btn:hover { background: rgba(255,255,255,0.15); }
        .notepad { width: 100%; height: 200px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 8px; padding: 12px; color: var(--text-main); resize: vertical; outline: none; font-size: 13px; font-family: var(--font-mono); }
        .notepad:focus { border-color: var(--accent-blue); }
    </style>
</head>
<body>
    <canvas id="neural-canvas"></canvas>

    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="auth-panel">
                <div class="brand-logo-area">
                    <div class="orion-logo-container">
                        <svg class="orion-svg" viewBox="0 0 100 100">
                            <defs>
                                <radialGradient id="glow-core" cx="50%" cy="50%" r="50%">
                                    <stop offset="0%" stop-color="#FFF" />
                                    <stop offset="50%" stop-color="#70B5FF" />
                                    <stop offset="100%" stop-color="var(--accent-blue)" />
                                </radialGradient>
                            </defs>
                            <circle class="orion-core-pulse" cx="50" cy="50" r="14" fill="url(#glow-core)" />
                            <circle class="orion-ring" cx="50" cy="50" r="35" fill="none" stroke-width="2.5" stroke-dasharray="40 20" />
                            <circle class="orion-ring" cx="50" cy="50" r="28" fill="none" stroke="rgba(10, 132, 255, 0.4)" stroke-width="1" stroke-dasharray="10 30" style="animation-direction: reverse; animation-duration: 20s;" />
                        </svg>
                        <span class="orion-text-quasar">OR<span class="orion-i-wrapper">I<span class="i-dot-orange-white"></span><span class="i-dot-blue-orbit"></span></span>ON</span>
                    </div>
                    <button class="close-sidebar" onclick="window.toggleSidebar()">&times;</button>
                </div>
                
                <div class="auth-card" id="authCard"></div>

            const escapedCode = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return `<div class="code-terminal"><div class="code-header"><span class="code-lang">${displayLang.toUpperCase()}</span><div class="code-actions"><button onclick="window.copiaCodice('${blockId}')">Copia</button><button onclick="window.scaricaCodice('${blockId}', '${displayLang}')">Scarica</button></div></div><pre><code id="${blockId}">${escapedCode}</code></pre></div>`;
        };
        marked.use({ renderer });
        
        const purifyConfig = { 
            ADD_TAGS: ['svg', 'path', 'circle', 'rect', 'line', 'polygon', 'polyline', 'g', 'defs', 'linearGradient', 'radialGradient', 'stop'], 
            FORBID_TAGS: ['script', 'iframe', 'object', 'embed'], 
            FORBID_ATTR: ['onerror', 'onload', 'onmouseover', 'onclick'] 
        };

        function inizializzaReteNeurale() {
            const canvas = document.getElementById('neural-canvas'); const ctx = canvas.getContext('2d'); let nodes = [];
            function ridimensiona() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', ridimensiona); ridimensiona();
            for(let i=0; i<80; i++) nodes.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5, radius: Math.random()*2.5+1.5 });
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.strokeStyle = 'rgba(255, 255, 255, 0.015)'; ctx.lineWidth = 1;
                for(let x=0; x<canvas.width; x+=50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
                for(let y=0; y<canvas.height; y+=50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
                for(let i=0; i<nodes.length; i++) {
                    let n = nodes[i]; n.x += n.vx; n.y += n.vy;
                    if(n.x < 0 || n.x > canvas.width) n.vx *= -1; if(n.y < 0 || n.y > canvas.height) n.vy *= -1;
                    ctx.beginPath(); ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2); ctx.fillStyle = 'rgba(255, 255, 255, 0.6)'; ctx.shadowColor = '#0A84FF'; ctx.shadowBlur = 10; ctx.fill(); ctx.shadowBlur = 0; 
                    for(let j=i+1; j<nodes.length; j++) {
                        let dist = Math.hypot(n.x - nodes[j].x, n.y - nodes[j].y);
                        if(dist < 150) { ctx.beginPath(); ctx.moveTo(n.x, n.y); ctx.lineTo(nodes[j].x, nodes[j].y); ctx.strokeStyle = `rgba(10, 132, 255, ${(1 - dist/150)*0.25})`; ctx.lineWidth = 1.2; ctx.stroke(); }
                    }
                }
                requestAnimationFrame(draw);
            }
            draw();
        }

        window.onload = () => { 
            inizializzaReteNeurale(); 
            caricaWorkspace(); 
            costruisciMobileLangMenu(); 
            initLang(); 
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) { 
                currentUser = user; 
                aggiornaUIAuthLoggato(user); 
                get(child(ref(db), `users/${user.uid}/settings/lang`)).then(snap => {
                    if(snap.exists()) { window.cambiaLingua(snap.val(), false); }
                    else { set(ref(db, `users/${user.uid}/settings/lang`), currentLangCode); }
                });
                await caricaCronologia(true); 
            } 
            else { 
                currentUser = null; 
                aggiornaUIAuthSloggato(); 
                await caricaCronologia(false); 
            }
        });

        window.loginConGoogle = () => { signInWithPopup(auth, provider).catch(console.error); };
        window.logoutFirebase = () => { isDataLoaded = false; signOut(auth).catch(console.error); };

        function aggiornaUIAuthSloggato() {
            const t = UI_TRANSLATIONS[currentLangCode] || UI_TRANSLATIONS['it'];
            document.getElementById('authCard').innerHTML = `<span class="user-status">${t.localMode}</span><button class="btn-auth" onclick="window.loginConGoogle()">${t.cloudLogin}</button>`;
        }

        function aggiornaUIAuthLoggato(user) {
            const t = UI_TRANSLATIONS[currentLangCode] || UI_TRANSLATIONS['it'];
            document.getElementById('authCard').innerHTML = `
                <span class="user-status" style="color: #34C759;">${t.sync}</span>
                <div class="user-profile"><img src="${user.photoURL || ''}" class="user-avatar" onerror="this.style.display='none'"><div class="user-info"><span class="user-name">${user.displayName}</span><span class="user-email">${user.email}</span></div></div>
                <button class="btn-logout" onclick="window.logoutFirebase()">${t.logout}</button>
            `;
        }

        function salvaStato() {
            if(!isDataLoaded) return; 
            if (currentUser) set(ref(db, 'users/' + currentUser.uid + '/chats'), chatSessions).catch(console.error);
            else localStorage.setItem('orion_local_history', JSON.stringify(chatSessions));
            disegnaListaCronologia();
        }

        async function caricaCronologia(isCloud) {
            chatSessions = [];
            try {
                if (isCloud && currentUser) {
                    const snapshot = await get(child(ref(db), `users/${currentUser.uid}/chats`));
                    if (snapshot.exists()) chatSessions = snapshot.val();
                } else {
                    const localData = localStorage.getItem('orion_local_history');
                    if (localData) chatSessions = JSON.parse(localData);
                }
            } catch (e) { console.error(e); }
            
            isDataLoaded = true;
            chatSessions.forEach(s => { if (!s.messages) s.messages = []; });
            disegnaListaCronologia();
            if(chatSessions.length > 0) window.selezionaSessione(chatSessions[0].id);
            else window.creaNuovaSessione();
        }

        function caricaWorkspace() {
            document.getElementById('quickNotes').value = localStorage.getItem('orion_notes') || '';
            taskData = JSON.parse(localStorage.getItem('orion_tasks') || '[]');
            renderizzaTasks();
        }
        window.salvaNote = () => { localStorage.setItem('orion_notes', document.getElementById('quickNotes').value); }
        window.salvaTasks = () => { localStorage.setItem('orion_tasks', JSON.stringify(taskData)); }
        
        function renderizzaTasks() {
            const taskListEl = document.getElementById('taskList'); taskListEl.innerHTML = '';
            taskData.forEach(task => {
                const li = document.createElement('li'); li.className = 'task-item';
                li.innerHTML = `<input type="checkbox" ${task.done ? 'checked' : ''} onchange="window.toggleTask(${task.id})"><input type="text" class="${task.done ? 'done' : ''}" value="${task.text}" onchange="window.updateTask(${task.id}, this.value)"><button style="background:none; border:none; color:var(--text-dim); cursor:pointer;" onclick="window.eliminaTask(${task.id})">&times;</button>`;
                taskListEl.appendChild(li);
            });
        }
        window.aggiungiTask = () => { taskData.push({ id: Date.now(), text: 'Task', done: false }); salvaTasks(); renderizzaTasks(); }
        window.toggleTask = (id) => { let t = taskData.find(x => x.id === id); if(t) t.done = !t.done; salvaTasks(); renderizzaTasks(); }
        window.updateTask = (id, val) => { let t = taskData.find(x => x.id === id); if(t) t.text = val; salvaTasks(); }
        window.eliminaTask = (id) => { taskData = taskData.filter(x => x.id !== id); salvaTasks(); renderizzaTasks(); }

        window.toggleSidebar = (e) => { if(e) e.stopPropagation(); document.getElementById('sidebar').classList.toggle('open'); document.getElementById('rightSidebar').classList.remove('open'); }
        window.toggleRightSidebar = (e) => { if(e) e.stopPropagation(); document.getElementById('rightSidebar').classList.toggle('open'); document.getElementById('sidebar').classList.remove('open'); }
        
        window.toggleQuantum = () => {
            isQuantumActive = !isQuantumActive;
            document.getElementById('quantumToggleBtn').classList.toggle('active', isQuantumActive);
            const txt = document.getElementById('qcStatusTxt');
            const t = UI_TRANSLATIONS[currentLangCode] || UI_TRANSLATIONS['it'];
            if(isQuantumActive) {
                txt.innerText = t.qMode; txt.style.color = "var(--accent-purple)";
                document.getElementById('modelSelector').style.display = "none"; document.getElementById('quantumLogo').style.display = "flex";
                document.getElementById('btnSend').classList.add('quantum-mode'); document.getElementById('inputBoxWrap').classList.add('quantum-focus');
            } else {
                txt.innerText = t.stdMode; txt.style.color = "var(--text-main)";
                document.getElementById('modelSelector').style.display = "block"; document.getElementById('quantumLogo').style.display = "none";
                document.getElementById('btnSend').classList.remove('quantum-mode'); document.getElementById('inputBoxWrap').classList.remove('quantum-focus');
            }
        }

        window.autoExpand = (field) => { field.style.height = 'inherit'; field.style.height = field.scrollHeight + 'px'; }
        document.getElementById('cmdInput').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.inviaMessaggio(); } });
        window.copiaCodice = (id) => { navigator.clipboard.writeText(document.getElementById(id).innerText).then(() => { const b = event.target; const o = b.innerText; b.innerText = 'Copiato!'; b.style.background = '#34C759'; setTimeout(() => { b.innerText = o; b.style.background = ''; }, 2000); }); };
        window.scaricaCodice = (id, lang) => { const b = new Blob([document.getElementById(id).innerText], { type: 'text/plain' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `snippet.${lang}`; document.body.appendChild(a); a.click(); document.body.removeChild(a); };

        function generateId() { return 'sess_' + Math.random().toString(36).substr(2, 9); }
        function getTimestamp() { return new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute:'2-digit' }); }

        // FIX MATEMATICA E REGEX CRITICA MOBILE: 
        // Eliminato il "lookbehind" negativo che bloccava il codice su Safari e dispositivi mobili
        function proteggiFormuleMarkdown(testo) {
            let mathTokens = [];
            
            // Blocchi display: $$ ... $$ o \[ ... \]
            let testoProtetto = testo.replace(/(\$\$[\s\S]*?\$\$|\\\[[\s\S]*?\\\])/g, (match) => {
                mathTokens.push(match);
                return `%%%MATH_TOKEN_${mathTokens.length - 1}%%%`;
            });

            // Formule inline: $ ... $ o \( ... \). Cattura il carattere precedente se non è uno slash
            testoProtetto = testoProtetto.replace(/(^|[^\\])(\$[^$\n]+?\$|\\\([\s\S]*?\\\))/g, (match, prefisso, formula) => {
                mathTokens.push(formula);
                return `${prefisso}%%%MATH_TOKEN_${mathTokens.length - 1}%%%`;
            });

            // Elabora Markdown in sicurezza
            let htmlMarkdown = marked.parse(testoProtetto);

            // Reintegra la matematica pulita (KaTeX la elaborerà successivamente in autonomia)
            mathTokens.forEach((token, index) => {
                htmlMarkdown = htmlMarkdown.replace(`%%%MATH_TOKEN_${index}%%%`, token);
            });

            return htmlMarkdown;
        }

        function renderizzaMessaggio(testo, mittente, timestamp, isQuantumMsg = false, modelType = "Sistema") {
            const chatStream = document.getElementById('chatStream');
            const wrap = document.createElement('div'); wrap.className = `msg-wrap msg-${mittente} ${isQuantumMsg ? 'quantum-msg' : ''}`;
            
            let testoHTML = proteggiFormuleMarkdown(testo);
            
            // Gestione grafica custom SVG generati dall'AI
            testoHTML = testoHTML.replace(/<svg[\s\S]*?<\/svg>/gi, (match) => `</div><div class="ai-generated-image">${DOMPurify.sanitize(match, purifyConfig)}</div><div class="bubble">`);
            
            // Pulizia e sicurezza XSS
            testoHTML = DOMPurify.sanitize(testoHTML, purifyConfig).replace(/<div class="bubble">\s*<\/div>/g, '');

            let innerHTML = `<div class="bubble">${testoHTML}</div>`;
            if (mittente === 'ai') innerHTML = `<div class="msg-meta"><span>${modelType}</span> • ${timestamp}</div>` + innerHTML;
            wrap.innerHTML = innerHTML; chatStream.appendChild(wrap);
            
            // Applicazione KaTeX nativa
            if (window.renderMathInElement) renderMathInElement(wrap, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}, {left: '\\[', right: '\\]', display: true}, {left: '\\(', right: '\\)', display: false}], throwOnError: false });
            chatStream.scrollTop = chatStream.scrollHeight;
        }

        window.creaNuovaSessione = () => {
            if(!isDataLoaded) return;
            const newId = generateId();
            chatSessions.unshift({ id: newId, title: 'Inizializzazione...', date: new Date().toLocaleDateString(), messages: [] });
            window.selezionaSessione(newId); salvaStato();
        }

        window.selezionaSessione = (id) => {
            currentSessionId = id; const chatStream = document.getElementById('chatStream'); chatStream.innerHTML = '';
            const session = chatSessions.find(s => s.id === id);
            
            if(session && session.messages) session.messages.forEach(m => renderizzaMessaggio(m.text, m.sender, m.time, m.isQuantum, m.modelType));
            if(session && session.messages.length === 0) {
                session.messages.push({ text: LORE_MESSAGE, sender: 'ai', time: getTimestamp(), isQuantum: false, modelType: 'Orion Core' });
                renderizzaMessaggio(LORE_MESSAGE, 'ai', getTimestamp(), false, 'Orion Core'); salvaStato();
            }
            if(window.innerWidth < 900) document.getElementById('sidebar').classList.remove('open');
            disegnaListaCronologia();
        }

        window.toggleMenuChat = (e, id) => { e.stopPropagation(); window.chiudiMenuPopup(); document.getElementById(`popup-${id}`).classList.toggle('show'); }
        window.eliminaChat = (e, id) => { e.stopPropagation(); chatSessions = chatSessions.filter(s => s.id !== id); if(chatSessions.length === 0) window.creaNuovaSessione(); else if(currentSessionId === id) window.selezionaSessione(chatSessions[0].id); salvaStato(); }
        window.esportaChat = (e, id) => {
            e.stopPropagation(); window.chiudiMenuPopup(); const session = chatSessions.find(s => s.id === id); if(!session) return;
            let exportTxt = `== ORION AI EXPORT ==\nData: ${session.date}\n\n`;
            session.messages.forEach(m => { exportTxt += `[${m.time}] ${m.sender === 'user' ? 'Tu' : m.modelType}:\n${m.text}\n\n`; });
            const b = new Blob([exportTxt], { type: 'text/plain' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `Orion_Chat.txt`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        function disegnaListaCronologia() {
            const historyList = document.getElementById('historyList'); historyList.innerHTML = '';
            chatSessions.forEach(sess => {
                const div = document.createElement('div'); div.className = `chat-item ${sess.id === currentSessionId ? 'active' : ''}`; div.onclick = () => window.selezionaSessione(sess.id);
                div.innerHTML = `<div class="chat-item-content"><div class="chat-item-title">${sess.title}</div><div class="chat-item-date">${sess.date}</div></div>
                    <button class="chat-options-btn" onclick="window.toggleMenuChat(event, '${sess.id}')"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg></button>
                    <div class="chat-popup" id="popup-${sess.id}"><button onclick="window.esportaChat(event, '${sess.id}')">Esporta</button><button class="delete-btn" onclick="window.eliminaChat(event, '${sess.id}')">Elimina</button></div>`;
                historyList.appendChild(div);
            });
        }

        async function chiamaBackendAPI(isQuantum) {
            const url = `https://api.groq.com/openai/v1/chat/completions`;
            const modelSelectorValue = document.getElementById('modelSelector').value;
            const selectedModel = isQuantum ? MODELS.quantum : MODELS[modelSelectorValue];
            
            const dynamicSystemPrompt = getSystemPrompt(currentLangName);
            const session = chatSessions.find(s => s.id === currentSessionId);
            let apiMessages = [ { role: "system", content: dynamicSystemPrompt } ];
            
            if (session && session.messages) {
                const recentMessages = session.messages.slice(-15);
                recentMessages.forEach(m => {
                    if(m.text === LORE_MESSAGE) return; 
                    apiMessages.push({ role: m.sender === 'user' ? "user" : "assistant", content: m.text });
                });
            }

            try {
                const response = await fetch(url, { method: "POST", headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" }, body: JSON.stringify({ model: selectedModel, messages: apiMessages }) });
                
                if(!response.ok) {
                    const errDetails = await response.text();
                    console.error("Groq API Error Detail:", errDetails);
                    return `Avviso: Errore del server mainframe (HTTP ${response.status}). Modello temporaneamente non disponibile sulla rete neurale. Verifica che il modello specificato esista nei server di collegamento.`;
                }

                const data = await response.json(); return data.choices?.[0]?.message?.content || "Errore di decodifica flussi dati.";
            } catch (error) { return "Nessun segnale dal mainframe. Verificare la rete o i gateway di connessione."; }
        }

        window.inviaMessaggio = async () => {
            const cmdInput = document.getElementById('cmdInput'); const text = cmdInput.value.trim(); if(!text) return;
            const timeUser = getTimestamp(); cmdInput.value = ''; cmdInput.style.height = 'auto';
            
            const session = chatSessions.find(s => s.id === currentSessionId);
            if(session.messages.length <= 1) session.title = text.substring(0, 30) + '...';
            
            session.messages.push({ text: text, sender: 'user', time: timeUser, isQuantum: false, modelType: 'User' });
            renderizzaMessaggio(text, 'user', timeUser, false, 'User'); salvaStato();

            document.getElementById('btnSend').disabled = true;
            let quantumAttivoAdesso = isQuantumActive;
            
            const msOpt = document.getElementById('modelSelector');
            let currentModelLabel = quantumAttivoAdesso ? "Orion Quantum" : msOpt.options[msOpt.selectedIndex].text;
            
            const chatStream = document.getElementById('chatStream');
            let terminalNode = document.createElement('div');
            try {
                terminalNode.className = `msg-wrap msg-ai ${quantumAttivoAdesso ? 'quantum-msg' : ''}`;
                terminalNode.innerHTML = `<div class="msg-meta"><span>${currentModelLabel}</span></div><div class="bubble"><div class="loading-wave"><div></div><div></div><div></div></div></div>`;
                chatStream.appendChild(terminalNode); chatStream.scrollTop = chatStream.scrollHeight;
                
                const reply = await chiamaBackendAPI(quantumAttivoAdesso);
                chatStream.removeChild(terminalNode);
                
                const timeAi = getTimestamp();
                session.messages.push({ text: reply, sender: 'ai', time: timeAi, isQuantum: quantumAttivoAdesso, modelType: currentModelLabel });
                renderizzaMessaggio(reply, 'ai', timeAi, quantumAttivoAdesso, currentModelLabel); salvaStato();

            } catch (e) {
                if (terminalNode && terminalNode.parentNode) chatStream.removeChild(terminalNode);
                renderizzaMessaggio("Errore di sistema critico.", "ai", getTimestamp(), false, currentModelLabel);
            } finally {
                document.getElementById('btnSend').disabled = false; cmdInput.focus();
            }
        }
    </script>
