<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orion - Horizon Quantum AI</title>
    <style>
        :root {
            --bg-deep: #050508;
            --glass-base: rgba(12, 14, 20, 0.6);
            --glass-border: rgba(0, 243, 255, 0.15);
            --glass-border-dim: rgba(255, 255, 255, 0.05);
            --accent-cyan: #00F3FF;
            --accent-cyan-dim: rgba(0, 243, 255, 0.2);
            --accent-purple: #8E2DE2;
            --alert-red: #FF3B30;
            --text-main: #FFFFFF;
            --text-dim: #8A99AD;
            --font-ui: -apple-system, "SF Pro Display", Inter, Roboto, sans-serif;
            --font-mono: "Fira Code", "SF Mono", monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-ui);
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        /* --- BACKGROUND COMPLESSO --- */
        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0;
            background-image: 
                linear-gradient(var(--glass-border-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--glass-border-dim) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.5;
            pointer-events: none;
        }
        .glow-orb { position: absolute; border-radius: 50%; filter: blur(120px); z-index: 0; opacity: 0.4; pointer-events: none; }
        .orb-1 { top: -10%; left: -10%; width: 40vw; height: 40vw; background: var(--accent-purple); }
        .orb-2 { bottom: -20%; right: -10%; width: 50vw; height: 50vw; background: #0A84FF; }

        /* --- MOTORE PARTICELLARE CHAT --- */
        #particles-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none; overflow: hidden;
        }
        .particle {
            position: absolute; border-radius: 50%; opacity: 0;
            animation: floatParticle linear infinite;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 0.5; transform: translateY(80vh) scale(1); }
            80% { opacity: 0.5; transform: translateY(20vh) scale(1); }
            100% { transform: translateY(-10vh) scale(0); opacity: 0; }
        }

        /* --- LAYOUT GRID --- */
        .app-layout { position: relative; z-index: 10; display: flex; width: 100%; height: 100%; }

        /* --- SIDEBAR CRONOLOGIA E AUTH --- */
        .sidebar {
            width: 320px; background: rgba(5, 6, 10, 0.85);
            backdrop-filter: blur(20px); border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 40; position: absolute; height: 100%; left: 0; transform: translateX(-100%);
        }
        .sidebar.open { transform: translateX(0); }

        @media (min-width: 900px) { .sidebar { position: relative; transform: translateX(0); } }

        /* Profilo / Auth Section */
        .auth-panel { padding: 24px; border-bottom: 1px solid var(--glass-border-dim); }
        .brand-logo-area { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .brand-logo-area svg { width: 32px; height: 32px; }
        .close-sidebar { display: block; background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }
        @media (min-width: 900px) { .close-sidebar { display: none; } }

        .auth-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border-dim);
            border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 12px;
        }
        .user-status { font-size: 11px; font-family: var(--font-mono); color: var(--accent-cyan); text-transform: uppercase; }
        
        .btn-google {
            background: #FFF; color: #000; border: none; border-radius: 8px; padding: 10px;
            font-weight: 600; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: 0.2s;
        }
        .btn-google:hover { background: #EEE; }
        .btn-google svg { width: 18px; height: 18px; }
        
        .user-profile { display: none; align-items: center; justify-content: space-between; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 32px; height: 32px; background: var(--accent-purple); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .btn-logout { background: none; border: 1px solid var(--alert-red); color: var(--alert-red); padding: 4px 8px; border-radius: 6px; font-size: 10px; cursor: pointer; }

        /* Lista Cronologia */
        .history-panel { flex-grow: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; position: relative; z-index: 10; }
        .history-panel::-webkit-scrollbar { width: 4px; }
        .history-panel::-webkit-scrollbar-thumb { background: var(--glass-border-dim); }
        
        .btn-new-chat {
            background: var(--accent-cyan-dim); border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan); width: 100%; padding: 12px; border-radius: 8px;
            font-family: var(--font-mono); font-size: 12px; text-transform: uppercase;
            cursor: pointer; transition: 0.2s; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-new-chat:hover { background: var(--accent-cyan); color: #000; box-shadow: 0 0 15px var(--accent-cyan-dim); }

        .chat-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.02); border: 1px solid transparent;
            padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        .chat-item:hover { background: rgba(255,255,255,0.05); border-color: var(--glass-border-dim); }
        .chat-item.active { background: rgba(0, 243, 255, 0.05); border-color: var(--accent-cyan); border-left: 3px solid var(--accent-cyan); }
        .chat-item-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; color: var(--text-main); }
        .chat-item-date { font-size: 10px; font-family: var(--font-mono); color: var(--text-dim); margin-top: 4px; }
        .btn-delete-chat { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 4px; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-delete-chat:hover { color: var(--alert-red); }

        /* --- MAIN AREA COMPLESSA --- */
        .main-area {
            flex-grow: 1; display: flex; flex-direction: column;
            background: var(--glass-base); backdrop-filter: blur(40px);
            position: relative; height: 100%; width: 100%;
        }

        /* Header Complesso */
        .main-header {
            padding: 16px 24px; border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.4); position: relative; z-index: 20;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }
        .mobile-menu-btn {
            background: none; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; padding: 8px;
            border: 1px solid var(--glass-border-dim); border-radius: 8px;
        }
        .mobile-menu-btn svg { width: 24px; height: 24px; fill: none; stroke: var(--accent-cyan); stroke-width: 2; }
        @media (min-width: 900px) { .mobile-menu-btn { display: none; } }
        
        .sys-telemetry { display: none; flex-direction: column; gap: 2px; }
        @media (min-width: 600px) { .sys-telemetry { display: flex; } }
        .sys-telemetry span { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); transition: color 0.3s; }
        .sys-telemetry span strong { color: #FFF; transition: color 0.3s; }

        /* Quantum Control */
        .quantum-control-panel {
            display: flex; align-items: center; gap: 12px;
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border-dim);
            padding: 6px 12px; border-radius: 8px;
        }
        .qc-labels { display: flex; flex-direction: column; align-items: flex-end; }
        .qc-title { font-size: 10px; font-family: var(--font-mono); color: var(--text-dim); text-transform: uppercase; }
        .qc-status { font-size: 12px; font-weight: bold; color: var(--text-main); transition: 0.3s; }
        
        .qc-btn {
            background: transparent; border: 1px solid var(--text-dim); width: 44px; height: 24px;
            border-radius: 12px; position: relative; cursor: pointer; transition: 0.3s;
        }
        .qc-btn::after {
            content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px;
            background: var(--text-dim); border-radius: 50%; transition: 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .qc-btn.active { border-color: var(--accent-purple); background: rgba(142, 45, 226, 0.2); }
        .qc-btn.active::after { transform: translateX(20px); background: var(--accent-purple); box-shadow: 0 0 10px var(--accent-purple); }

        /* Chat Stream */
        .chat-stream {
            flex-grow: 1; padding: 30px 5%; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; position: relative; z-index: 10;
        }

        .msg-wrap { display: flex; flex-direction: column; width: 100%; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-meta { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); margin-bottom: 4px; display: flex; gap: 8px; }
        .msg-user { align-items: flex-end; }
        .msg-ai { align-items: flex-start; }

        .bubble { max-width: 85%; padding: 16px 20px; border-radius: 16px; font-size: 14px; line-height: 1.6; position: relative; }
        .msg-user .bubble { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border-dim); border-bottom-right-radius: 4px; }
        
        /* Stile speciale per la AI a seconda della modalità */
        .msg-ai .bubble {
            background: rgba(0, 243, 255, 0.05); border: 1px solid var(--accent-cyan-dim);
            border-bottom-left-radius: 4px; box-shadow: inset 0 0 20px rgba(0,243,255,0.02);
            backdrop-filter: blur(5px);
        }
        .msg-ai.quantum-msg .bubble {
            background: rgba(142, 45, 226, 0.05); border: 1px solid rgba(142, 45, 226, 0.3);
            box-shadow: inset 0 0 20px rgba(142, 45, 226, 0.05);
        }

        /* Evidenziazione concetti chiave nella presentazione */
        .lore-highlight { color: var(--accent-cyan); font-weight: 600; }
        .lore-quantum { color: var(--accent-purple); font-family: var(--font-mono); font-size: 12px;}

        /* Advanced Input Console */
        .input-console {
            padding: 20px 5%; background: rgba(0,0,0,0.6); border-top: 1px solid var(--glass-border);
            display: flex; flex-direction: column; gap: 8px; position: relative; z-index: 20;
        }
        .input-tools { display: flex; gap: 12px; padding-left: 16px; }
        .tool-icon { background: none; border: none; cursor: pointer; opacity: 0.5; transition: 0.2s; }
        .tool-icon:hover { opacity: 1; }
        .tool-icon svg { width: 16px; height: 16px; fill: var(--text-main); }

        .input-glass-box {
            display: flex; align-items: flex-end; background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border-dim); border-radius: 16px; padding: 8px 8px 8px 20px; transition: border 0.3s;
        }
        .input-glass-box:focus-within { border-color: var(--accent-cyan); box-shadow: 0 0 15px var(--accent-cyan-dim); }
        .input-glass-box.quantum-focus:focus-within { border-color: var(--accent-purple); box-shadow: 0 0 15px rgba(142, 45, 226, 0.2); }

        .console-textarea {
            flex-grow: 1; background: transparent; border: none; outline: none; color: var(--text-main);
            font-size: 15px; font-family: var(--font-ui); resize: none; max-height: 200px; min-height: 24px; padding: 10px 0;
        }
        .btn-transmit {
            background: var(--text-main); border: none; width: 44px; height: 44px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; margin-left: 12px; flex-shrink: 0;
        }
        .btn-transmit:hover { transform: scale(1.05); background: var(--accent-cyan); box-shadow: 0 0 20px var(--accent-cyan); }
        .btn-transmit.quantum-mode:hover { background: var(--accent-purple); box-shadow: 0 0 20px var(--accent-purple); }
        .btn-transmit svg { width: 20px; height: 20px; fill: #000; }

        /* Quantum Decryption Overlay */
        .quantum-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100;
            background: rgba(2, 3, 5, 0.95); backdrop-filter: blur(20px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .quantum-overlay.active { display: flex; }
        .q-core-container { display: flex; flex-direction: column; align-items: center; gap: 30px; width: 100%; max-width: 500px; padding: 20px; }
        
        .q-ring { position: relative; width: 160px; height: 160px; }
        .q-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .q-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 3; }
        .q-fill { fill: none; stroke: var(--accent-purple); stroke-width: 3; stroke-dasharray: 440; stroke-dashoffset: 0; filter: drop-shadow(0 0 12px var(--accent-purple)); }
        
        .q-timer-txt { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .q-timer-txt .num { font-family: var(--font-mono); font-size: 36px; font-weight: 300; }
        .q-timer-txt .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--accent-purple); letter-spacing: 2px; }

        .q-logs { width: 100%; background: #000; border: 1px solid rgba(142, 45, 226, 0.3); border-radius: 8px; height: 150px; padding: 12px; overflow: hidden; position: relative; box-shadow: inset 0 0 20px rgba(142, 45, 226, 0.05);}
        .q-log-line { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
        .q-log-line span { color: var(--accent-purple); }

    </style>
</head>
<body>

    <div class="cyber-grid"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="app-layout">
        
        <aside class="sidebar" id="sidebar">
            <div class="auth-panel">
                <div class="brand-logo-area">
                    <svg viewBox="0 0 100 100">
                        <polygon points="50,5 95,25 95,75 50,95 5,75 5,25" fill="none" stroke="#00F3FF" stroke-width="4"/>
                        <circle cx="50" cy="50" r="10" fill="#00F3FF"/>
                    </svg>
                    <button class="close-sidebar" onclick="toggleSidebar()">&times;</button>
                </div>

                <div class="auth-card" id="authCardUnlogged">
                    <span class="user-status">Stato: Cache Locale (Ospite)</span>
                    <button class="btn-google" onclick="simulaLoginFirebase()">
                        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        Accedi per Cloud Sync
                    </button>
                </div>
                
                <div class="auth-card user-profile" id="authCardLogged">
                    <span class="user-status">Stato: Firebase Sync Attivo</span>
                    <div style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
                        <div class="user-info">
                            <div class="avatar" id="userAvatar">U</div>
                            <div>
                                <div style="font-size:12px; font-weight:bold;" id="userName">Utente</div>
                                <div style="font-size:9px; color:var(--text-dim);" id="userEmail">user@mail.com</div>
                            </div>
                        </div>
                        <button class="btn-logout" onclick="simulaLogoutFirebase()">Esci</button>
                    </div>
                </div>
            </div>

            <div class="history-panel">
                <button class="btn-new-chat" onclick="creaNuovaSessione()">
                    <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    Nuova Sessione
                </button>
                <div id="historyList"></div>
            </div>
        </aside>

        <main class="main-area">
            
            <div id="particles-bg"></div>

            <header class="main-header">
                <div class="header-left">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()">
                        <svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                    </button>
                    <div class="sys-telemetry">
                        <span id="modelNameDisplay">MODEL: <strong>OrionAI 8.1 Pro</strong></span>
                        <span id="latencyDisplay">LATENCY: <strong style="color:var(--accent-cyan)">12ms</strong></span>
                    </div>
                </div>

                <div class="quantum-control-panel">
                    <div class="qc-labels">
                        <span class="qc-title">Quantum Core</span>
                        <span class="qc-status" id="qcStatusTxt" style="color:var(--text-dim);">DISABILITATO</span>
                    </div>
                    <button class="qc-btn" id="quantumToggleBtn" onclick="toggleQuantum()"></button>
                </div>
            </header>

            <div class="chat-stream" id="chatStream"></div>

            <footer class="input-console">
                <div class="input-tools">
                    <button class="tool-icon" title="Allega File"><svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5a2.5 2.5 0 0 0 5 0V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg></button>
                    <button class="tool-icon" title="Terminale"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .9-2 2v12c0 1.1.89 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.89-2-2-2zm-9 14H5v-2h6v2zm3-4H5v-2h9v2zm5-4H5V8h14v2z"/></svg></button>
                </div>
                <div class="input-glass-box" id="inputBoxWrap">
                    <textarea id="cmdInput" class="console-textarea" placeholder="Inizializza query..." rows="1" oninput="autoExpand(this)"></textarea>
                    <button class="btn-transmit" id="btnSend" onclick="inviaMessaggio()">
                        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </footer>

            <div class="quantum-overlay" id="quantumOverlay">
                <div class="q-core-container">
                    <div class="q-ring">
                        <svg><circle class="q-bg" cx="80" cy="80" r="70"/><circle class="q-fill" id="qRingPath" cx="80" cy="80" r="70"/></svg>
                        <div class="q-timer-txt"><div class="num" id="qTimerNum">15.00</div><div class="lbl">SUPERPOSITION</div></div>
                    </div>
                    <div class="q-logs" id="qLogStream"></div>
                </div>
            </div>

        </main>
    </div>

    <script>
        /* =========================================================================
           CONFIGURAZIONE LOGICA DI BASE E STATO APPLICATIVO
           ========================================================================= */
        let isQuantumActive = false;
        let isLoggedIn = false;
        let currentUser = null;
        let currentSessionId = null;
        let chatSessions = [];

        const LORE_MESSAGE = `SISTEMA INIZIALIZZATO.<br><br>Benvenuto nel mainframe <span class="lore-highlight">Horizon</span>. L'entità cognitiva <strong>OrionAI</strong> è ora online.<br><br>Sfruttando l'architettura dei processori applicati a <span class="lore-quantum">Qubit Topologici Majorana 1</span> sviluppati in partnership con Microsoft, i supercomputer quantistici di Horizon garantiscono tassi di decoerenza prossimi allo zero. Questo hardware sperimentale permette a Orion di esistere, processando reti neurali avanzate su stati multipli di sovrapposizione.<br><br>Modulo <span class="lore-highlight">OrionAI 8.1 Pro</span> attivo. In attesa di parametri di input.`;

        // Elementi DOM
        const sidebar = document.getElementById('sidebar');
        const chatStream = document.getElementById('chatStream');
        const cmdInput = document.getElementById('cmdInput');
        const historyList = document.getElementById('historyList');
        const modelNameDisplay = document.getElementById('modelNameDisplay');
        const latencyDisplay = document.getElementById('latencyDisplay');

        // Utils
        function generateId() { return 'sess_' + Math.random().toString(36).substr(2, 9); }
        function getTimestamp() { return new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute:'2-digit', second:'2-digit' }); }

        /* =========================================================================
           EFFETTI VISIVI (PARTICELLE BACKGROUND)
           ========================================================================= */
        function generaParticelle() {
            const container = document.getElementById('particles-bg');
            const particleCount = 40;
            
            for(let i=0; i<particleCount; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                
                // Randomizzazione
                let size = Math.random() * 4 + 1;
                let left = Math.random() * 100;
                let duration = Math.random() * 10 + 5;
                let delay = Math.random() * 5;
                let color = Math.random() > 0.5 ? 'var(--accent-cyan)' : 'var(--accent-purple)';
                
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = left + '%';
                p.style.background = color;
                p.style.boxShadow = `0 0 10px ${color}`;
                p.style.animationDuration = duration + 's';
                p.style.animationDelay = delay + 's';
                
                container.appendChild(p);
            }
        }
        window.onload = generaParticelle;

        /* =========================================================================
           UX MOBILE & INTERFACCIA
           ========================================================================= */
        function toggleSidebar() { sidebar.classList.toggle('open'); }
        
        function toggleQuantum() {
            isQuantumActive = !isQuantumActive;
            const btn = document.getElementById('quantumToggleBtn');
            const txt = document.getElementById('qcStatusTxt');
            const btnSend = document.getElementById('btnSend');
            const inputBoxWrap = document.getElementById('inputBoxWrap');
            
            btn.classList.toggle('active', isQuantumActive);
            
            if(isQuantumActive) {
                txt.innerText = "ATTIVATO";
                txt.style.color = "var(--accent-purple)";
                modelNameDisplay.innerHTML = 'MODEL: <strong style="color:var(--accent-purple)">Orion Quantum 1.0</strong>';
                latencyDisplay.innerHTML = 'LATENCY: <strong style="color:var(--accent-purple)">0.01ms (Entangled)</strong>';
                btnSend.classList.add('quantum-mode');
                inputBoxWrap.classList.add('quantum-focus');
            } else {
                txt.innerText = "DISABILITATO";
                txt.style.color = "var(--text-dim)";
                modelNameDisplay.innerHTML = 'MODEL: <strong>OrionAI 8.1 Pro</strong>';
                latencyDisplay.innerHTML = 'LATENCY: <strong style="color:var(--accent-cyan)">12ms</strong>';
                btnSend.classList.remove('quantum-mode');
                inputBoxWrap.classList.remove('quantum-focus');
            }
        }

        function autoExpand(field) {
            field.style.height = 'inherit';
            field.style.height = field.scrollHeight + 'px';
        }

        cmdInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); inviaMessaggio(); }
        });

        function renderizzaMessaggio(testo, mittente, timestamp, isQuantumMsg = false) {
            const wrap = document.createElement('div');
            wrap.className = `msg-wrap msg-${mittente} ${isQuantumMsg ? 'quantum-msg' : ''}`;
            
            let header = 'OPERATORE';
            if (mittente === 'ai') {
                header = isQuantumMsg ? '<span style="color:var(--accent-purple)">ORION QUANTUM 1.0</span>' : 'ORIONAI 8.1 PRO';
            }
            
            wrap.innerHTML = `
                <div class="msg-meta"><span>${header}</span> • <span>${timestamp}</span></div>
                <div class="bubble">${testo}</div>
            `;
            chatStream.appendChild(wrap);
            chatStream.scrollTop = chatStream.scrollHeight;
        }

        /* =========================================================================
           LOGICA GESTIONE DATI (FIREBASE STUB & LOCALSTORAGE)
           ========================================================================= */
        function simulaLoginFirebase() {
            isLoggedIn = true;
            currentUser = { name: "Admin Engineer", email: "admin@horizon.com", avatar: "H" };
            aggiornaStatoUIAuth();
            caricaCronologia();
        }

        function simulaLogoutFirebase() {
            isLoggedIn = false;
            currentUser = null;
            aggiornaStatoUIAuth();
            caricaCronologia();
        }

        function aggiornaStatoUIAuth() {
            document.getElementById('authCardUnlogged').style.display = isLoggedIn ? 'none' : 'flex';
            document.getElementById('authCardLogged').style.display = isLoggedIn ? 'flex' : 'none';
            if(isLoggedIn) {
                document.getElementById('userName').innerText = currentUser.name;
                document.getElementById('userEmail').innerText = currentUser.email;
                document.getElementById('userAvatar').innerText = currentUser.avatar;
            }
        }

        function caricaCronologia() {
            chatSessions = []; 
            if(!isLoggedIn) {
                const cache = localStorage.getItem('orion_chats');
                if(cache) chatSessions = JSON.parse(cache);
            }
            disegnaListaCronologia();
            
            if(chatSessions.length > 0) selezionaSessione(chatSessions[0].id);
            else creaNuovaSessione();
        }

        function salvaStato() {
            if(!isLoggedIn) localStorage.setItem('orion_chats', JSON.stringify(chatSessions));
            disegnaListaCronologia();
        }

        function creaNuovaSessione() {
            const newId = generateId();
            chatSessions.unshift({ id: newId, title: 'Inizializzazione Core', date: new Date().toLocaleDateString(), messages: [] });
            selezionaSessione(newId);
            salvaStato();
            if(window.innerWidth < 900) sidebar.classList.remove('open');
        }

        function selezionaSessione(id) {
            currentSessionId = id;
            chatStream.innerHTML = '';
            const session = chatSessions.find(s => s.id === id);
            
            if(session && session.messages) {
                session.messages.forEach(m => renderizzaMessaggio(m.text, m.sender, m.time, m.isQuantum));
            }
            
            // LORE DROP al primo avvio
            if(session.messages.length === 0) {
                const initTime = getTimestamp();
                session.messages.push({ text: LORE_MESSAGE, sender: 'ai', time: initTime, isQuantum: false });
                renderizzaMessaggio(LORE_MESSAGE, 'ai', initTime, false);
                salvaStato();
            }
            disegnaListaCronologia();
        }

        function eliminaSessione(e, id) {
            e.stopPropagation();
            chatSessions = chatSessions.filter(s => s.id !== id);
            salvaStato(); 
            if(chatSessions.length === 0) creaNuovaSessione();
            else selezionaSessione(chatSessions[0].id);
        }

        function disegnaListaCronologia() {
            historyList.innerHTML = '';
            chatSessions.forEach(sess => {
                const div = document.createElement('div');
                div.className = `chat-item ${sess.id === currentSessionId ? 'active' : ''}`;
                div.onclick = () => selezionaSessione(sess.id);
                div.innerHTML = `
                    <div style="overflow:hidden;">
                        <div class="chat-item-title">${sess.title}</div>
                        <div class="chat-item-date">${sess.date}</div>
                    </div>
                    <button class="btn-delete-chat" onclick="eliminaSessione(event, '${sess.id}')" title="Elimina">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </button>
                `;
                historyList.appendChild(div);
            });
        }

        /* =========================================================================
           RAGIONAMENTO QUANTISTICO & INTEGRAZIONE BACKEND
           ========================================================================= */
        
        async function eseguiMotoreQuantistico() {
            return new Promise(resolve => {
                const overlay = document.getElementById('quantumOverlay');
                const logStream = document.getElementById('qLogStream');
                const num = document.getElementById('qTimerNum');
                const ring = document.getElementById('qRingPath');
                
                overlay.classList.add('active');
                logStream.innerHTML = '';
                
                let timeLeft = 15.00;
                const circ = 2 * Math.PI * 70;
                
                const logger = setInterval(() => {
                    const row = document.createElement('div');
                    row.className = 'q-log-line';
                    row.innerHTML = `<span>[0x${Math.floor(Math.random()*16777215).toString(16).padStart(6,'0')}]</span> COLLAPSING MAJORANA STATES...`;
                    logStream.appendChild(row);
                    if(logStream.children.length > 8) logStream.removeChild(logStream.firstChild);
                }, 100);

                const startTime = performance.now();
                function tick(now) {
                    const el = (now - startTime)/1000;
                    timeLeft = 15.00 - el;
                    if(timeLeft <= 0) {
                        clearInterval(logger);
                        num.innerText = "0.00";
                        ring.style.strokeDashoffset = circ;
                        setTimeout(() => { overlay.classList.remove('active'); resolve(); }, 500);
                        return;
                    }
                    num.innerText = timeLeft.toFixed(2);
                    ring.style.strokeDashoffset = circ * (el/15.00);
                    requestAnimationFrame(tick);
                }
                requestAnimationFrame(tick);
            });
        }

        // Simula la chiamata API (Qui inserirai l'endpoint del tuo Backend con Gemini API)
        async function chiamaBackendAPI(testo, isQuantum) {
            return new Promise(res => setTimeout(() => {
                let risposta = isQuantum 
                    ? `[Risposta Quantistica Generata da Qubit Majorana] Dati processati oltre i limiti classici. Elaborazione completata.`
                    : `Ricezione standard confermata da OrionAI 8.1 Pro. Backend in attesa di configurazione definitiva.`;
                res(risposta);
            }, 1000));
        }

        async function inviaMessaggio() {
            const text = cmdInput.value.trim();
            if(!text) return;

            const timeUser = getTimestamp();
            cmdInput.value = ''; cmdInput.style.height = 'auto';
            
            const session = chatSessions.find(s => s.id === currentSessionId);
            if(session.messages.length === 1 && session.title === 'Inizializzazione Core') {
                session.title = text.substring(0, 30) + '...';
            }
            
            // Salvataggio messaggio Utente
            session.messages.push({ text: text.replace(/\n/g, '<br>'), sender: 'user', time: timeUser, isQuantum: false });
            renderizzaMessaggio(text.replace(/\n/g, '<br>'), 'user', timeUser, false);
            salvaStato();

            document.getElementById('btnSend').disabled = true;

            try {
                const quantumAttivoAdesso = isQuantumActive;

                if(quantumAttivoAdesso) await eseguiMotoreQuantistico();
                
                const reply = await chiamaBackendAPI(text, quantumAttivoAdesso);
                const timeAi = getTimestamp();
                
                // Salvataggio messaggio AI
                session.messages.push({ text: reply, sender: 'ai', time: timeAi, isQuantum: quantumAttivoAdesso });
                renderizzaMessaggio(reply, 'ai', timeAi, quantumAttivoAdesso);
                salvaStato();

            } catch (e) {
                renderizzaMessaggio("ERRORE DI RETE. IMPOSSIBILE CONTATTARE I CLUSTER HORIZON.", "ai", getTimestamp(), false);
            } finally {
                document.getElementById('btnSend').disabled = false;
                cmdInput.focus();
            }
        }

        // Avvio iniziale
        caricaCronologia();

    </script>
</body>
